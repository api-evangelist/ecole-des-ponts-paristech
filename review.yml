  - date: '2026-06-03'
    rating: 2
    summary: >-
      No general-purpose, self-service developer portal was found for École des Ponts
      ParisTech (ENPC). The verifiable public API footprint is research- and
      library-oriented. The institution's open-access output is exposed as the ENPC
      collection on the national HAL platform: the HAL Search API returned 43,726
      records for the ENPC collection (HTTP 200, real JSON), and the HAL OAI-PMH
      Identify verb resolved live (HTTP 200, valid OAI-PMH XML). These are shared
      national CCSD/HAL endpoints scoped to the institution rather than ENPC-hosted
      services. The official EcoleDesPontsParisTech GitHub org exists with one public
      repo (an Omeka OAI-PMH plugin). The institution website, library portal, and
      X/Twitter resolved. No course/timetable/SIS, identity/SSO, or mobile-backend
      APIs were publicly documented; none were fabricated. The espacechercheurs.enpc.fr
      open-science host did not resolve from this environment.
